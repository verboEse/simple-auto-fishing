name: Build and Release on loader branches

on:
  push:
    branches:
      - fabric-*
      - forge-*

permissions:
  contents: write

concurrency:
  group: loader-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Build plugin
        shell: bash
        run: |
          set -euo pipefail

          if [[ -f "./gradlew" ]]; then
            chmod +x ./gradlew
            ./gradlew --no-daemon build
          elif [[ -x "./mvnw" ]]; then
            ./mvnw -B package
          elif [[ -f "pom.xml" ]]; then
            mvn -B package
          else
            echo "No supported Java build tool found. Expected ./gradlew, ./mvnw, or pom.xml." >&2
            exit 1
          fi

      - name: Resolve artifact metadata and package release asset
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          to_kebab() {
            echo "$1" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//; s/-+/-/g'
          }

          read_prop() {
            local file="$1"
            local key="$2"
            if [[ -f "$file" ]]; then
              grep -E "^${key}=" "$file" | head -n1 | cut -d'=' -f2- | tr -d '[:space:]'
            fi
          }

          repo_name="${GITHUB_REPOSITORY##*/}"
          plugin_name="${PLUGIN_NAME:-}"
          if [[ -z "$plugin_name" ]]; then
            plugin_name="$(read_prop gradle.properties archives_base_name)"
          fi
          if [[ -z "$plugin_name" ]]; then
            plugin_name="$(read_prop gradle.properties archivesBaseName)"
          fi
          if [[ -z "$plugin_name" ]]; then
            plugin_name="$(read_prop gradle.properties mod_id)"
          fi
          if [[ -z "$plugin_name" ]]; then
            plugin_name="$(to_kebab "$repo_name")"
          else
            plugin_name="$(to_kebab "$plugin_name")"
          fi

          minecraft_version="${MINECRAFT_VERSION:-}"
          if [[ -z "$minecraft_version" ]]; then
            minecraft_version="$(read_prop gradle.properties minecraft_version)"
          fi
          if [[ -z "$minecraft_version" ]]; then
            minecraft_version="$(read_prop gradle.properties minecraftVersion)"
          fi

          branch_name="${GITHUB_REF_NAME}"
          platform=""
          if [[ "$branch_name" =~ ^(fabric|forge)- ]]; then
            platform="${BASH_REMATCH[1]}"
          fi

          plugin_version="${PLUGIN_VERSION:-}"
          if [[ -z "$plugin_version" ]]; then
            plugin_version="$(read_prop gradle.properties mod_version)"
          fi
          if [[ -z "$plugin_version" ]]; then
            plugin_version="$(read_prop gradle.properties version)"
          fi
          if [[ -z "$plugin_version" ]]; then
            plugin_version="$(read_prop gradle.properties plugin_version)"
          fi

          if [[ -z "$minecraft_version" ]]; then
            echo "Unable to resolve minecraft version. Set MINECRAFT_VERSION or define minecraft_version in gradle.properties." >&2
            exit 1
          fi

          if [[ -z "$plugin_version" ]]; then
            echo "Unable to resolve plugin version. Set PLUGIN_VERSION or define mod_version/version in gradle.properties." >&2
            exit 1
          fi

          mapfile -t jars < <(find build/libs target -maxdepth 4 -type f -name '*.jar' ! -name '*-sources.jar' ! -name '*-javadoc.jar' 2>/dev/null | sort)
          if [[ "${#jars[@]}" -eq 0 ]]; then
            echo "No built plugin JAR was found in build/libs or target." >&2
            exit 1
          fi

          src_jar="${jars[0]}"

          if [[ -z "$platform" ]]; then
            echo "Unable to resolve platform from branch '${branch_name}'. Expected branch name starting with 'fabric-' or 'forge-'." >&2
            exit 1
          fi

          platform="$(to_kebab "$platform")"
          jar_name="${plugin_name}-${platform}-${minecraft_version}-${plugin_version}.jar"
          jar_path="${RUNNER_TEMP}/${jar_name}"
          cp "$src_jar" "$jar_path"

          tag_name="${platform}-v${plugin_version}"
          release_name="${plugin_name} ${minecraft_version} v${plugin_version}"

          {
            echo "jar_name=${jar_name}"
            echo "jar_path=${jar_path}"
            echo "tag_name=${tag_name}"
            echo "release_name=${release_name}"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release and upload JAR
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: ${{ steps.meta.outputs.release_name }}
          target_commitish: ${{ github.sha }}
          files: ${{ steps.meta.outputs.jar_path }}
          fail_on_unmatched_files: true
          generate_release_notes: true
